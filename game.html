<style>
:root{
  --ta:#3b8bff;--tb:#ff4444;--hud:rgba(8,12,20,.72);--bdr:rgba(255,255,255,.08);
  --tp:#f0f4fa;--ts:#9ab0cc;--ac:#ffcc00;--green:#22cc55;--meter-a:#3b8bff;--meter-b:#ff4444;
  font-family:'Rajdhani','Outfit',system-ui,sans-serif;color-scheme:dark
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#060a10;color:var(--tp)}
canvas{display:block;position:fixed;inset:0;z-index:0}

/* ═══ HUD ═══ */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center}
#hud>*{pointer-events:auto}
#hud-top{display:flex;align-items:center;gap:0;margin-top:.8rem;background:var(--hud);border:1px solid var(--bdr);border-radius:18px;backdrop-filter:blur(16px);overflow:hidden}
.score-box{display:flex;align-items:center;gap:.3rem;padding:.5rem 1rem}
.score-box.a{background:linear-gradient(135deg,rgba(59,139,255,.2),transparent)}
.score-box.b{background:linear-gradient(135deg,transparent,rgba(255,68,68,.2))}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;text-transform:uppercase;opacity:.7}
.team-name.a{color:var(--ta)}.team-name.b{color:var(--tb)}
.score{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;font-weight:400;min-width:2ch;text-align:center;line-height:1}
.team-a{color:var(--ta);text-shadow:0 0 20px rgba(59,139,255,.5)}
.team-b{color:var(--tb);text-shadow:0 0 20px rgba(255,68,68,.5)}
.timer-box{padding:.3rem .9rem;border-left:1px solid var(--bdr);border-right:1px solid var(--bdr);text-align:center}
.timer{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--ts);min-width:5ch;letter-spacing:.04em}
.half-lbl{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ts);opacity:.6}

/* Meter bars */
#meter-wrap{display:flex;gap:.3rem;margin-top:.35rem;align-items:center}
.meter-bar{width:120px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;position:relative}
.meter-fill{height:100%;border-radius:3px;transition:width .3s ease}
.meter-fill.a{background:linear-gradient(90deg,var(--ta),#66b3ff)}
.meter-fill.b{background:linear-gradient(90deg,#ff6666,var(--tb))}
.meter-lbl{font-size:.65rem;font-weight:700;color:var(--ac);letter-spacing:.06em}

/* Secondary info row */
#hud-info{display:flex;gap:1.2rem;margin-top:.25rem;font-size:.75rem;font-weight:600;letter-spacing:.05em}
#hud-poss{color:var(--ts)}
#hud-combo{color:var(--ac);opacity:0;transition:opacity .3s}
#hud-combo.active{opacity:1}

/* Callout */
#callout{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,7rem);letter-spacing:.06em;text-transform:uppercase;color:var(--ac);text-shadow:0 0 40px rgba(255,204,0,.7),0 4px 20px rgba(0,0,0,.5);pointer-events:none;z-index:20;animation:cpulse .4s ease-out}
#callout.hidden{display:none}
#callout.goal-callout{color:#fff;text-shadow:0 0 60px rgba(255,204,0,.9),0 0 120px rgba(255,204,0,.4)}
#callout.foul-callout{color:#ff6666;text-shadow:0 0 40px rgba(255,0,0,.6)}
@keyframes cpulse{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-50%) scale(1)}}

/* Controls hint */
.ctrl{position:fixed;bottom:.8rem;left:50%;transform:translateX(-50%);display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;background:var(--hud);border:1px solid var(--bdr);border-radius:10px;backdrop-filter:blur(12px);padding:.4rem 1rem;font-size:.72rem;color:var(--ts);pointer-events:none;transition:opacity .5s}
.ctrl.hidden{opacity:0;pointer-events:none}
.ctrl span{display:flex;align-items:center;gap:.25rem}
kbd{display:inline-block;padding:.1rem .35rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;font-family:inherit;font-size:.68rem;font-weight:700;color:var(--tp);line-height:1.2}

/* Minimap */
#minimap{position:fixed;bottom:3.5rem;right:.8rem;width:160px;height:100px;background:rgba(10,20,30,.8);border:1px solid var(--bdr);border-radius:8px;z-index:15;pointer-events:none;overflow:hidden}
#minimap canvas{width:100%;height:100%}

/* Overlays */
.ov{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(4,8,16,.88);backdrop-filter:blur(12px)}
.ov.hidden{display:none;pointer-events:none}
.ovc{text-align:center;max-width:600px;padding:2rem}
.badge{display:inline-block;padding:.3rem .8rem;border:2px solid var(--ac);border-radius:999px;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ac);margin-bottom:.8rem}
.ovc h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,7rem);letter-spacing:.04em;line-height:1;margin-bottom:.8rem;background:linear-gradient(135deg,#fff 30%,var(--ac) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ovc h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--tp);margin-bottom:.5rem}
.ovc p{font-size:1rem;color:var(--ts);line-height:1.5}
.ovc .stats{display:grid;grid-template-columns:1fr auto 1fr;gap:.3rem .8rem;margin:1.5rem 0;font-size:.9rem}
.ovc .stats .label{color:var(--ts);text-align:center}
.ovc .stats .val-a{text-align:right;color:var(--ta);font-weight:700}
.ovc .stats .val-b{text-align:left;color:var(--tb);font-weight:700}

/* Menu buttons */
.menu-btn{display:inline-block;padding:.6rem 2rem;margin:.3rem;border:2px solid var(--ac);border-radius:8px;background:transparent;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.1em;color:var(--ac);cursor:pointer;transition:all .2s;text-transform:uppercase}
.menu-btn:hover{background:var(--ac);color:#000;transform:scale(1.05)}
.menu-btn.secondary{border-color:var(--ts);color:var(--ts)}
.menu-btn.secondary:hover{background:var(--ts);color:#000}

/* Pause menu */
#pause-menu{z-index:60}
#pause-menu .ovc{background:var(--hud);border:1px solid var(--bdr);border-radius:16px;backdrop-filter:blur(20px);padding:2rem 3rem}

/* Options */
.slider-row{display:flex;align-items:center;gap:1rem;margin:.5rem 0;font-size:.9rem;color:var(--ts)}
.slider-row label{min-width:100px;text-align:right}
.slider-row input[type=range]{flex:1;accent-color:var(--ac)}

/* Shot charge bar */
#charge-bar{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);width:200px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;z-index:15;opacity:0;transition:opacity .2s}
#charge-bar.active{opacity:1}
#charge-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--ac),#ff4444);border-radius:4px;transition:width .05s linear}

/* FPS counter */
#fps{position:fixed;top:.5rem;right:.5rem;font-size:.7rem;color:var(--ts);z-index:100;pointer-events:none;font-family:monospace}

/* Set piece indicator */
#sp-indicator{position:fixed;top:55%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.1em;color:var(--ac);opacity:0;z-index:18;pointer-events:none;transition:opacity .3s}
#sp-indicator.active{opacity:1}
</style>

<script type="module">
import*as THREE from'three';

/* ══════════════════════════════════════════════════════════════════════════
   CONFIG & CONSTANTS
   ══════════════════════════════════════════════════════════════════════════ */
const CFG={

  pl:60,pw:40,hl:30,hw:20,gw:8,gd:2.5,gh:3,pal:14,paw:22,cr:7,lw:.12,

  accelRate:35,decelRate:25,
  // Tackle

  slideDur:.5,slideDash:16,slideCD:1.2,shoulderRange:1.8,shoulderKB:6,
  // Ball
  ballR:.28,friction:2.8,shortPassSpd:13,drivenPassSpd:18,throughPassSpd:15,
  shootMinSpd:14,shootMaxSpd:28,ballY:.28,
  // Match
  halfTime:180,goalPause:2.8,htPause:3,koPause:1.5,otTime:60,
  // AI
  aiShootRng:18,aiPassChance:.4,aiTackleRng:2.2,
  // Meter
  meterMax:100,meterPassGain:4,meterComboGain:2,meterTackleGain:6,
  meterTrickGain:3,meterShotGain:5,meterComebackBonus:8,
  meterPowerTackle:25,meterPrecisionPass:20,meterPowerShot:30,meterRecovery:15,
  // Combo
  comboTimeout:4,
  // Tricks
  trickDur:.4,trickCD:.8,trickSpamCD:2,
};

/* ══════════════════════════════════════════════════════════════════════════
   AUDIO ENGINE (Web Audio API)
   ══════════════════════════════════════════════════════════════════════════ */
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type='sine',vol=.15,attack=.01,decay=.1){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  const t=audioCtx.currentTime;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+attack);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur);
}
function playNoise(dur,vol=.08,hp=200,lp=4000){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const hpf=audioCtx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=hp;
  const lpf=audioCtx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=lp;
  const g=audioCtx.createGain();
  const t=audioCtx.currentTime;
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  src.connect(hpf);hpf.connect(lpf);lpf.connect(g);g.connect(audioCtx.destination);
  src.start(t);src.stop(t+dur);
}
const SFX={
  kick(){playTone(180,.15,'triangle',.2,.005,.1);playNoise(.08,.12,400,2000)},
  pass(){playTone(320,.1,'sine',.12,.005,.08)},
  shoot(){playTone(120,.25,'sawtooth',.18,.005,.2);playNoise(.12,.15,200,3000)},
  goal(){playTone(523,.1,'square',.15);setTimeout(()=>playTone(659,.1,'square',.15),100);setTimeout(()=>playTone(784,.3,'square',.18),200);playNoise(.5,.1,100,800)},
  tackle(){playNoise(.15,.2,100,1500);playTone(80,.12,'sawtooth',.15)},
  foul(){playTone(880,.5,'sine',.2,.01,.4);setTimeout(()=>playTone(880,.3,'sine',.15),600)},
  whistle(){playTone(2200,.15,'sine',.12);setTimeout(()=>playTone(2400,.25,'sine',.15),180)},
  click(){playTone(800,.06,'sine',.08)},
  meter(){playTone(440,.08,'sine',.1);playTone(660,.08,'sine',.1)},
  combo(){playTone(880,.06,'sine',.08);playTone(1100,.06,'sine',.06)},
  crowd(intensity=.5){playNoise(.3,.05*intensity,80,600)},
  save(){playTone(200,.2,'triangle',.12);playNoise(.1,.1,300,1500)},
  bounce(){playTone(400,.06,'triangle',.08)},
};

/* ══════════════════════════════════════════════════════════════════════════
   INPUT
   ══════════════════════════════════════════════════════════════════════════ */
const pressed=new Set(),justP=new Set(),justR=new Set();
const holdTime={};
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(!pressed.has(k)){justP.add(k);holdTime[k]=0}
  pressed.add(k);
  if(k==='escape')e.preventDefault();
});
window.addEventListener('keyup',e=>{const k=e.key.toLowerCase();pressed.delete(k);justR.add(k)});
window.addEventListener('blur',()=>{pressed.clear();justP.clear();justR.clear()});
const isDown=(...k)=>k.some(x=>pressed.has(x.toLowerCase()));
const wasP=(...k)=>k.some(x=>justP.has(x.toLowerCase()));
const wasR=(...k)=>k.some(x=>justR.has(x.toLowerCase()));
function updateHoldTimes(dt){for(const k of pressed)holdTime[k]=(holdTime[k]||0)+dt}
const endFrame=()=>{justP.clear();justR.clear()};

/* ══════════════════════════════════════════════════════════════════════════

   ══════════════════════════════════════════════════════════════════════════ */
const ARCHETYPES=[
  {name:'Blitz',role:'Street Striker',spd:8,acc:9,pas:6,sht:8,ctrl:7,bal:5,tpow:4,disc:5,rec:6,styl:8,color:0x22ccff,h:1.75,bulk:.35},

  {name:'Bolt',role:'Flash Winger',spd:9,acc:9,pas:7,sht:6,ctrl:6,bal:4,tpow:3,disc:6,rec:5,styl:7,color:0xffaa22,h:1.78,bulk:.32},
  {name:'Sarge',role:'Veteran Enforcer',spd:5,acc:5,pas:6,sht:5,ctrl:5,bal:8,tpow:8,disc:3,rec:8,styl:4,color:0x556633,h:1.85,bulk:.48},
  {name:'Dynamo',role:'Midfield Engine',spd:7,acc:7,pas:7,sht:7,ctrl:7,bal:6,tpow:6,disc:7,rec:6,styl:6,color:0x7766dd,h:1.8,bulk:.38},
  {name:'Phantom',role:'Masked Trickster',spd:7,acc:7,pas:8,sht:6,ctrl:9,bal:3,tpow:3,disc:6,rec:4,styl:10,color:0x9933cc,h:1.72,bulk:.33},
  {name:'Hammer',role:'Power Finisher',spd:6,acc:5,pas:5,sht:10,ctrl:5,bal:7,tpow:7,disc:5,rec:6,styl:5,color:0xcc3333,h:1.88,bulk:.46},
  {name:'Flex',role:'Acrobat',spd:8,acc:8,pas:6,sht:7,ctrl:8,bal:5,tpow:4,disc:6,rec:5,styl:8,color:0x33cccc,h:1.7,bulk:.31},
  {name:'Spike',role:'Punk Speedster',spd:10,acc:9,pas:5,sht:6,ctrl:6,bal:3,tpow:4,disc:4,rec:4,styl:7,color:0xff33aa,h:1.73,bulk:.3},
  {name:'Noble',role:'Elegant Captain',spd:6,acc:6,pas:8,sht:7,ctrl:8,bal:7,tpow:5,disc:9,rec:7,styl:7,color:0xddbb44,h:1.82,bulk:.4},
  {name:'Wreck',role:'Wildcard Brawler',spd:6,acc:6,pas:4,sht:6,ctrl:4,bal:8,tpow:10,disc:2,rec:8,styl:5,color:0x885522,h:1.92,bulk:.52},
];

/* ══════════════════════════════════════════════════════════════════════════
   PARTICLE SYSTEM
   ══════════════════════════════════════════════════════════════════════════ */
class ParticlePool{
  constructor(scene,maxCount=500){
    this.max=maxCount;this.scene=scene;
    this.particles=[];
    for(let i=0;i<maxCount;i++){
      const g=new THREE.Mesh(new THREE.SphereGeometry(.06,4,4),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true}));
      g.visible=false;scene.add(g);
      this.particles.push({mesh:g,vel:new THREE.Vector3(),life:0,maxLife:0,color:0xffffff,scale:1,gravity:0});
    }
  }
  emit(pos,count,opts={}){
    const {color=0xffffff,speed=3,spread=1,life=.6,scale=1,gravity=-5}=opts;
    let spawned=0;
    for(const p of this.particles){
      if(p.life>0||spawned>=count)continue;
      p.mesh.position.copy(pos);
      p.vel.set((Math.random()-.5)*spread,Math.random()*speed,(Math.random()-.5)*spread);
      p.life=life+Math.random()*life*.3;p.maxLife=p.life;
      p.color=color;p.scale=scale;p.gravity=gravity;
      p.mesh.material.color.setHex(color);
      p.mesh.visible=true;spawned++;
    }
  }
  update(dt){
    for(const p of this.particles){
      if(p.life<=0){p.mesh.visible=false;continue}
      p.life-=dt;
      p.vel.y+=p.gravity*dt;
      p.mesh.position.addScaledVector(p.vel,dt);
      const t=Math.max(0,p.life/p.maxLife);
      p.mesh.material.opacity=t;
      const s=p.scale*(.5+t*.5);
      p.mesh.scale.setScalar(s);
      if(p.mesh.position.y<0)p.mesh.position.y=0;
    }
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   WORLD / ARENA
   ══════════════════════════════════════════════════════════════════════════ */
function createWorld(sc){
  sc.background=new THREE.Color(0x080e18);
  sc.fog=new THREE.FogExp2(0x080e18,.008);

  // Ambient
  sc.add(new THREE.AmbientLight(0x8899bb,.4));

  // Main light
  const sun=new THREE.DirectionalLight(0xffeedd,2.2);
  sun.position.set(15,35,10);sun.castShadow=true;
  sun.shadow.mapSize.set(2048,2048);
  const sc2=sun.shadow.camera;sc2.left=-38;sc2.right=38;sc2.top=28;sc2.bottom=-28;sc2.near=1;sc2.far=80;
  sc.add(sun);

  // Stadium spots
  const spots=[
    {pos:[-35,18,-25],color:0x4488ff,int:80},
    {pos:[35,18,-25],color:0xff4444,int:80},
    {pos:[-35,18,25],color:0x4488ff,int:60},
    {pos:[35,18,25],color:0xff4444,int:60},
    {pos:[0,20,0],color:0xffffff,int:40},
  ];
  for(const s of spots){
    const l=new THREE.PointLight(s.color,s.int,60);
    l.position.set(...s.pos);sc.add(l);
    // Light fixture
    const fix=new THREE.Mesh(new THREE.BoxGeometry(.8,.3,.8),new THREE.MeshBasicMaterial({color:s.color}));
    fix.position.copy(l.position);sc.add(fix);
  }

  // Ground
  const gnd=new THREE.Mesh(
    new THREE.PlaneGeometry(CFG.pl+12,CFG.pw+12),
    new THREE.MeshStandardMaterial({color:0x1a6f2a,roughness:.82})
  );
  gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;sc.add(gnd);

  // Turf stripes
  const stripeM=new THREE.MeshStandardMaterial({color:0x1e8030,roughness:.85});
  const sw=CFG.pl/12;
  for(let i=0;i<12;i+=2){
    const s=new THREE.Mesh(new THREE.PlaneGeometry(sw,CFG.pw),stripeM);
    s.rotation.x=-Math.PI/2;s.position.set(-CFG.hl+sw*i+sw/2,.004,0);s.receiveShadow=true;sc.add(s);
  }

  // Lines
  const lm=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.85});
  const addL=(x,z,w,h)=>{const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),lm);m.rotation.x=-Math.PI/2;m.position.set(x,.008,z);sc.add(m)};
  const lw=CFG.lw;
  // Boundary
  addL(0,-CFG.hw,CFG.pl,lw);addL(0,CFG.hw,CFG.pl,lw);
  addL(-CFG.hl,0,lw,CFG.pw);addL(CFG.hl,0,lw,CFG.pw);
  // Center
  addL(0,0,lw,CFG.pw);
  const cir=new THREE.Mesh(new THREE.RingGeometry(CFG.cr-lw/2,CFG.cr+lw/2,48),lm);
  cir.rotation.x=-Math.PI/2;cir.position.y=.008;sc.add(cir);
  const cs=new THREE.Mesh(new THREE.CircleGeometry(.2,16),lm);cs.rotation.x=-Math.PI/2;cs.position.y=.009;sc.add(cs);
  // Penalty areas
  addL(-CFG.hl+CFG.pal,0,lw,CFG.paw);addL(-CFG.hl+CFG.pal/2,-CFG.paw/2,CFG.pal,lw);addL(-CFG.hl+CFG.pal/2,CFG.paw/2,CFG.pal,lw);
  addL(CFG.hl-CFG.pal,0,lw,CFG.paw);addL(CFG.hl-CFG.pal/2,-CFG.paw/2,CFG.pal,lw);addL(CFG.hl-CFG.pal/2,CFG.paw/2,CFG.pal,lw);
  // Penalty spots
  const psM=new THREE.Mesh(new THREE.CircleGeometry(.15,12),lm);
  psM.rotation.x=-Math.PI/2;psM.position.set(-CFG.hl+10,.009,0);sc.add(psM);
  const psM2=psM.clone();psM2.position.set(CFG.hl-10,.009,0);sc.add(psM2);
  // Goal area (6-yard box)
  const gaW=12,gaD=5;
  addL(-CFG.hl+gaD,0,lw,gaW);addL(-CFG.hl+gaD/2,-gaW/2,gaD,lw);addL(-CFG.hl+gaD/2,gaW/2,gaD,lw);
  addL(CFG.hl-gaD,0,lw,gaW);addL(CFG.hl-gaD/2,-gaW/2,gaD,lw);addL(CFG.hl-gaD/2,gaW/2,gaD,lw);

  // Goals
  const pm=new THREE.MeshStandardMaterial({color:0xdddddd,roughness:.3,metalness:.7});
  const nm=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.12,side:THREE.DoubleSide,wireframe:true});
  for(const side of[-1,1]){
    const g=new THREE.Group();
    const lp=new THREE.Mesh(new THREE.CylinderGeometry(.1,.1,CFG.gh,8),pm);lp.position.set(0,CFG.gh/2,-CFG.gw/2);lp.castShadow=true;g.add(lp);
    const rp=lp.clone();rp.position.set(0,CFG.gh/2,CFG.gw/2);g.add(rp);
    const cb=new THREE.Mesh(new THREE.CylinderGeometry(.1,.1,CFG.gw,8),pm);cb.rotation.x=Math.PI/2;cb.position.set(0,CFG.gh,0);cb.castShadow=true;g.add(cb);
    const bn=new THREE.Mesh(new THREE.PlaneGeometry(CFG.gw,CFG.gh,10,5),nm);bn.position.set(-side*CFG.gd,CFG.gh/2,0);g.add(bn);
    const sn1=new THREE.Mesh(new THREE.PlaneGeometry(CFG.gd,CFG.gh,3,5),nm);sn1.rotation.y=Math.PI/2;sn1.position.set(-side*CFG.gd/2,CFG.gh/2,-CFG.gw/2);g.add(sn1);
    const sn2=sn1.clone();sn2.position.z=CFG.gw/2;g.add(sn2);
    const tn=new THREE.Mesh(new THREE.PlaneGeometry(CFG.gw,CFG.gd,10,3),nm);tn.rotation.x=Math.PI/2;tn.position.set(-side*CFG.gd/2,CFG.gh,0);g.add(tn);
    g.position.x=side*CFG.hl;sc.add(g);
  }

  // Walls / barriers
  const wallM=new THREE.MeshStandardMaterial({color:0x1a2030,roughness:.6,metalness:.3});
  const barrierM=new THREE.MeshStandardMaterial({color:0x333344,roughness:.5,metalness:.4});

  // Side barriers
  for(const zs of[-1,1]){
    const w=new THREE.Mesh(new THREE.BoxGeometry(CFG.pl+12,1.2,.4),barrierM);
    w.position.set(0,.6,zs*(CFG.hw+3));w.castShadow=true;sc.add(w);
    // Barrier stripes
    const stripe=new THREE.Mesh(new THREE.BoxGeometry(CFG.pl+12,.15,.42),new THREE.MeshBasicMaterial({color:0xffcc00}));
    stripe.position.set(0,1,.001+zs*(CFG.hw+3));sc.add(stripe);
  }
  // End barriers (around goals)
  for(const xs of[-1,1]){
    const hw=(CFG.pw+6-CFG.gw)/2;
    for(const zs of[-1,1]){
      const w=new THREE.Mesh(new THREE.BoxGeometry(.4,1.2,hw),barrierM);
      w.position.set(xs*(CFG.hl+3),.6,zs*(CFG.gw/2+hw/2));w.castShadow=true;sc.add(w);
    }
  }

  // Stands (instanced crowd)
  const standGeo=new THREE.BoxGeometry(.6,.8,.6);
  const colors=[0x3355aa,0xaa3344,0x44aa55,0xaa8833,0x6644aa,0xaa5533];
  for(const zs of[-1,1]){
    for(let x=-28;x<=28;x+=1.5){
      for(let row=0;row<4;row++){
        const cm=new THREE.MeshStandardMaterial({color:colors[Math.floor(Math.random()*colors.length)],roughness:.9});
        const fig=new THREE.Mesh(standGeo,cm);
        fig.position.set(x, 1+row*.8, zs*(CFG.hw+5+row*1.5));
        fig.scale.y=.8+Math.random()*.4;
        sc.add(fig);
      }
    }
  }

  // Ground outside pitch
  const outer=new THREE.Mesh(new THREE.PlaneGeometry(140,100),new THREE.MeshStandardMaterial({color:0x0c1620,roughness:1}));
  outer.rotation.x=-Math.PI/2;outer.position.y=-.02;outer.receiveShadow=true;sc.add(outer);

  // Ad boards (simple text-like boxes along sides)
  const adM=new THREE.MeshBasicMaterial({color:0x112233});
  for(const zs of[-1,1]){
    for(let x=-25;x<=25;x+=12){
      const ad=new THREE.Mesh(new THREE.BoxGeometry(10,.6,.08),adM);
      ad.position.set(x,.3,zs*(CFG.hw+2.7));sc.add(ad);
      // Ad text stripe
      const txt=new THREE.Mesh(new THREE.BoxGeometry(8,.25,.09),new THREE.MeshBasicMaterial({color:0xffcc00}));
      txt.position.set(x,.3,zs*(CFG.hw+2.65));sc.add(txt);
    }
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   PLAYER
   ══════════════════════════════════════════════════════════════════════════ */
const S={LOCO:0,TACKLE:1,STUN:2,KD:3,REC:4,SLIDE:5,TRICK:6,PASS:7,SHOOT:8,RECEIVE:9,SETPIECE:10};
const TC={A:0x3b8bff,B:0xff4444};

function createPlayer(team,idx,isHuman,startPos,archetype){
  const a=archetype||ARCHETYPES[idx%ARCHETYPES.length];
  const group=new THREE.Group();

  // Body
  const bodyH=a.h*.5;
  const body=new THREE.Mesh(
    new THREE.CapsuleGeometry(a.bulk,bodyH,6,12),
    new THREE.MeshStandardMaterial({color:TC[team],roughness:.4,metalness:.15,emissive:TC[team],emissiveIntensity:.05})
  );
  body.position.y=bodyH/2+.3;body.castShadow=true;group.add(body);

  // Head
  const headR=.2+a.bulk*.15;
  const head=new THREE.Mesh(
    new THREE.SphereGeometry(headR,8,8),
    new THREE.MeshStandardMaterial({color:0xddbb88,roughness:.5})
  );
  head.position.y=bodyH+.3+headR;head.castShadow=true;group.add(head);

  // Team ring
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(.25,.04,6,16),
    new THREE.MeshBasicMaterial({color:TC[team],transparent:true,opacity:.8})
  );
  ring.rotation.x=Math.PI/2;ring.position.y=bodyH+.3+headR*2+.15;group.add(ring);

  // Number label (simple box)
  const numBox=new THREE.Mesh(
    new THREE.PlaneGeometry(.3,.3),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.6})
  );
  numBox.position.set(0,bodyH/2+.3,-(a.bulk+.02));group.add(numBox);

  // Shadow
  const sh=new THREE.Mesh(new THREE.CircleGeometry(.45,16),new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:.2}));
  sh.rotation.x=-Math.PI/2;sh.position.y=.015;group.add(sh);

  // Human marker
  if(isHuman){
    const hr=new THREE.Mesh(new THREE.RingGeometry(.55,.65,24),new THREE.MeshBasicMaterial({color:0xffcc00,transparent:true,opacity:.65}));
    hr.rotation.x=-Math.PI/2;hr.position.y=.02;group.add(hr);
  }

  // Pass target ring (hidden by default)
  const targetRing=new THREE.Mesh(
    new THREE.RingGeometry(.6,.72,24),
    new THREE.MeshBasicMaterial({color:0x00ff66,transparent:true,opacity:0})
  );
  targetRing.rotation.x=-Math.PI/2;targetRing.position.y=.02;group.add(targetRing);

  const spdMod=a.spd/7;
  const accMod=a.acc/7;

  const p={
    group,body,head,ring,targetRing,team,idx,isHuman,archetype:a,
    startPos:startPos.clone(),
    state:S.LOCO,stateT:0,tackleCD:0,trickCD:0,
    facing:new THREE.Vector3(-Math.sign(startPos.x)||1,0,0),
    velocity:new THREE.Vector3(),
    hasBall:false,isSprinting:false,isStrafing:false,
    moveDir:new THREE.Vector3(),
    chargeTime:0,isCharging:false,
    trickType:0,trickSuccess:false,
    lastTrickTime:0,trickCount:0,
    wakeupProtected:0,
    // Stats
    stats:{goals:0,assists:0,passes:0,tackles:0,fouls:0,tricks:0,shots:0},

    get position(){return group.position},
    get facingDir(){return p.facing.clone()},
    get isLocked(){return p.state!==S.LOCO},
    get canTackle(){return p.state===S.LOCO&&p.tackleCD<=0},
    get canTrick(){return p.state===S.LOCO&&p.trickCD<=0&&p.hasBall},
    get maxSpeed(){return(p.isSprinting?CFG.sprintSpd:CFG.baseSpd)*spdMod*(p.hasBall?CFG.carrierPen:1)*(p.isStrafing?CFG.strafePen:1)},

    resetTo(pos){
      group.position.set(pos.x,0,pos.z);p.state=S.LOCO;p.stateT=0;p.tackleCD=0;p.trickCD=0;
      p.hasBall=false;p.moveDir.set(0,0,0);p.velocity.set(0,0,0);p.chargeTime=0;p.isCharging=false;
      p.facing.set(-Math.sign(pos.x)||1,0,0);p.wakeupProtected=0;
    },
    resetStart(){p.resetTo(p.startPos)},

    triggerTackle(type='standing'){
      if(!p.canTackle)return false;
      if(type==='slide'){p.state=S.SLIDE;p.stateT=CFG.slideDur;p.tackleCD=CFG.slideCD}
      else{p.state=S.TACKLE;p.stateT=CFG.tackleDur;p.tackleCD=CFG.tackleCD}
      return true;
    },
    triggerTrick(dir){
      if(!p.canTrick)return false;
      const now=performance.now()/1000;
      if(now-p.lastTrickTime<1)p.trickCount++;else p.trickCount=1;
      p.lastTrickTime=now;
      if(p.trickCount>=3){p.trickCD=CFG.trickSpamCD;p.trickSuccess=false;return false}
      p.state=S.TRICK;p.stateT=CFG.trickDur;p.trickCD=CFG.trickCD;
      p.trickSuccess=Math.random()<.7+a.ctrl*.03;
      // Quick dodge
      if(dir&&dir.lengthSq()>.01){
        p.velocity.copy(dir.normalize().multiplyScalar(8));
      }else{
        p.velocity.copy(p.facing.clone().multiplyScalar(6));
      }
      p.stats.tricks++;
      return p.trickSuccess;
    },
    applyStun(){p.state=S.STUN;p.stateT=CFG.stunDur*(1-a.rec*.03)},
    applyKD(){p.state=S.KD;p.stateT=CFG.kdDur*(1-a.rec*.02)},

    update(dt,ball){
      p.tackleCD=Math.max(0,p.tackleCD-dt);
      p.trickCD=Math.max(0,p.trickCD-dt);
      p.wakeupProtected=Math.max(0,p.wakeupProtected-dt);

      // Target ring fade
      targetRing.material.opacity=Math.max(0,targetRing.material.opacity-.5*dt);

      if(p.state===S.LOCO){
        if(p.moveDir.lengthSq()>.01){
          const d=p.moveDir.clone().normalize();
          p.facing.lerp(d,.25);p.facing.normalize();
          const maxSpd=p.maxSpeed;
          const targetVel=d.clone().multiplyScalar(maxSpd);
          p.velocity.lerp(targetVel,CFG.accelRate*accMod*dt);
        }else{
          p.velocity.multiplyScalar(1-CFG.decelRate*dt);
          if(p.velocity.lengthSq()<.01)p.velocity.set(0,0,0);
        }
        group.position.addScaledVector(p.velocity,dt);
        if(p.velocity.lengthSq()>.1)body.rotation.y=Math.atan2(p.facing.x,p.facing.z);

        // Ball pickup
        if(!p.hasBall&&ball.isFree&&p.position.distanceTo(ball.position)<1.1){
          ball.attachTo(p);
        }
        if(p.hasBall)ball.followCarrier(p);

      }else if(p.state===S.TACKLE){
        p.stateT-=dt;
        group.position.addScaledVector(p.facing,CFG.tackleDash*dt);
        if(p.stateT<=0){p.state=S.LOCO;p.velocity.set(0,0,0)}

      }else if(p.state===S.SLIDE){
        p.stateT-=dt;
        group.position.addScaledVector(p.facing,CFG.slideDash*dt*(p.stateT/CFG.slideDur));
        body.rotation.x=Math.PI/3;
        if(p.stateT<=0){p.state=S.REC;p.stateT=CFG.recDur;body.rotation.x=0}

      }else if(p.state===S.TRICK){
        p.stateT-=dt;
        group.position.addScaledVector(p.velocity,dt);
        p.velocity.multiplyScalar(.9);
        body.rotation.y+=15*dt;
        if(p.stateT<=0){p.state=S.LOCO;p.velocity.set(0,0,0);body.rotation.x=0}
        if(p.hasBall)ball.followCarrier(p);

      }else if(p.state===S.PASS||p.state===S.SHOOT||p.state===S.RECEIVE){
        p.stateT-=dt;
        p.velocity.multiplyScalar(.8);
        group.position.addScaledVector(p.velocity,dt);
        if(p.stateT<=0){p.state=S.LOCO;p.velocity.set(0,0,0)}

      }else if(p.state===S.STUN){
        p.stateT-=dt;
        p.velocity.multiplyScalar(.9);
        group.position.addScaledVector(p.velocity,dt);
        if(p.stateT<=0){p.state=S.REC;p.stateT=CFG.recDur}

      }else if(p.state===S.KD){
        p.stateT-=dt;
        body.rotation.x=Math.PI/2;
        p.velocity.multiplyScalar(.85);
        group.position.addScaledVector(p.velocity,dt);
        if(p.stateT<=0){p.state=S.REC;p.stateT=CFG.recDur;body.rotation.x=0;p.wakeupProtected=.5}

      }else if(p.state===S.REC){
        p.stateT-=dt;
        if(p.stateT<=0){p.state=S.LOCO;p.stateT=0}

      }else if(p.state===S.SETPIECE){
        p.velocity.set(0,0,0);
      }

      // Clamp to field
      const pp=group.position;
      pp.x=THREE.MathUtils.clamp(pp.x,-(CFG.hl+4),CFG.hl+4);
      pp.z=THREE.MathUtils.clamp(pp.z,-(CFG.hw+4),CFG.hw+4);
      pp.y=0;
    }
  };
  p.resetTo(startPos);
  return p;
}

/* ══════════════════════════════════════════════════════════════════════════
   BALL
   ══════════════════════════════════════════════════════════════════════════ */
const BS={FREE:0,CARRY:1,PASS:2,SHOT:3,GOAL:4,THROUGH:5,OOB:6,DEFLECT:7};

function createBall(){
  const geo=new THREE.SphereGeometry(CFG.ballR,16,12);
  const mat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.25,metalness:.05,emissive:0x444444,emissiveIntensity:.25});
  const mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;mesh.position.y=CFG.ballY;

  // Ball trail
  const trailPoints=[];
  for(let i=0;i<20;i++)trailPoints.push(new THREE.Vector3());
  const trailGeo=new THREE.BufferGeometry().setFromPoints(trailPoints);
  const trailMat=new THREE.LineBasicMaterial({color:0xffcc00,transparent:true,opacity:.3});
  const trail=new THREE.Line(trailGeo,trailMat);

  const b={
    mesh,trail,state:BS.FREE,vel:new THREE.Vector3(),spin:new THREE.Vector3(),
    carrier:null,lastToucher:null,possTeam:null,scoredSide:0,
    passOrigin:null,shotOrigin:null,pendingTarget:null,quality:'normal',
    trailIdx:0,

    get position(){return mesh.position},
    get isFree(){return b.state===BS.FREE},
    get speed(){return b.vel.length()},

    resetCenter(){
      mesh.position.set(0,CFG.ballY,0);b.vel.set(0,0,0);b.spin.set(0,0,0);
      b.state=BS.FREE;b.carrier=null;b.scoredSide=0;b.quality='normal';
    },
    attachTo(pl){
      b.carrier=pl;b.lastToucher=pl;b.possTeam=pl.team;pl.hasBall=true;b.state=BS.CARRY;b.vel.set(0,0,0);
    },
    followCarrier(pl){
      const o=pl.facingDir.multiplyScalar(.65);
      mesh.position.set(pl.position.x+o.x,CFG.ballY,pl.position.z+o.z);
    },
    releasePass(dir,type='short'){
      if(!b.carrier)return;
      const spd=type==='driven'?CFG.drivenPassSpd:type==='through'?CFG.throughPassSpd:CFG.shortPassSpd;
      b.passOrigin=b.carrier;b.carrier.hasBall=false;b.lastToucher=b.carrier;
      b.carrier.stats.passes++;b.carrier=null;
      b.state=type==='through'?BS.THROUGH:BS.PASS;
      b.vel.copy(dir.normalize().multiplyScalar(spd));
      SFX.pass();
    },
    releaseShot(dir,power=1){
      if(!b.carrier)return;
      const spd=THREE.MathUtils.lerp(CFG.shootMinSpd,CFG.shootMaxSpd,power);
      b.shotOrigin=b.carrier;b.carrier.hasBall=false;b.lastToucher=b.carrier;
      b.carrier.stats.shots++;b.carrier=null;
      b.state=BS.SHOT;b.vel.copy(dir.normalize().multiplyScalar(spd));
      SFX.shoot();
    },
    forceRelease(){
      if(b.carrier){b.carrier.hasBall=false;b.lastToucher=b.carrier;b.carrier=null}b.state=BS.FREE;
    },

    update(dt){
      if(b.state===BS.CARRY||b.state===BS.GOAL||b.state===BS.OOB)return;

      mesh.position.addScaledVector(b.vel,dt);mesh.position.y=CFG.ballY;
      // Spin rotation
      if(b.vel.length()>.5){
        mesh.rotation.x+=b.vel.z*dt*3;mesh.rotation.z-=b.vel.x*dt*3;
      }
      // Friction
      const spd=b.vel.length();
      if(spd>.1){
        const drag=1-CFG.friction*dt/spd;
        b.vel.multiplyScalar(Math.max(drag,0));
      }else{b.vel.set(0,0,0);if(b.state!==BS.GOAL)b.state=BS.FREE}

      // Side walls
      if(Math.abs(mesh.position.z)>CFG.hw){
        mesh.position.z=Math.sign(mesh.position.z)*CFG.hw;
        b.vel.z*=-.55;b.state=BS.FREE;SFX.bounce();
      }

      // Goal check
      if(Math.abs(mesh.position.x)>CFG.hl&&Math.abs(mesh.position.z)<=CFG.gw/2){
        b.state=BS.GOAL;b.vel.set(0,0,0);b.scoredSide=mesh.position.x<0?-1:1;
        return;
      }

      // End wall bounce (outside goal)
      if(Math.abs(mesh.position.x)>CFG.hl&&Math.abs(mesh.position.z)>CFG.gw/2){
        mesh.position.x=Math.sign(mesh.position.x)*CFG.hl;
        b.vel.x*=-.45;b.state=BS.FREE;SFX.bounce();
      }

      // Trail update
      if(b.trailIdx%2===0){
        const pos=trailPoints.pop();pos.copy(mesh.position);trailPoints.unshift(pos);
        trailGeo.setFromPoints(trailPoints);
      }
      b.trailIdx++;
      trailMat.opacity=Math.min(.4,spd*.03);
    }
  };
  return b;
}

/* ══════════════════════════════════════════════════════════════════════════
   AI
   ══════════════════════════════════════════════════════════════════════════ */
function updateAI(pl,ball,teammates,opponents,dt,meter){
  if(pl.isHuman||pl.isLocked){if(!pl.isHuman)pl.moveDir.set(0,0,0);return}

  const goalX=pl.team==='A'?CFG.hl:-CFG.hl;
  const ownGX=pl.team==='A'?-CFG.hl:CFG.hl;

  if(pl.hasBall){
    const toGoal=new THREE.Vector3(goalX,0,0).sub(pl.position);
    const dist=toGoal.length();

    // Shooting
    if(dist<CFG.aiShootRng&&Math.random()<.02*dt*60){
      const sd=toGoal.normalize();sd.z+=(Math.random()-.5)*.4;
      ball.releaseShot(sd,Math.random()*.5+.5);return;
    }
    // Passing
    if(Math.random()<CFG.aiPassChance*dt){
      const target=findPassTarget(pl,teammates);
      if(target){
        const pd=target.position.clone().sub(pl.position);pd.y=0;
        const type=pd.length()>20?'driven':'short';
        ball.releasePass(pd,type);return;
      }
    }
    // Tricks
    if(pl.canTrick&&opponents.some(o=>o.position.distanceTo(pl.position)<3)&&Math.random()<.3*dt*60){
      pl.triggerTrick(pl.facingDir);return;
    }

    pl.moveDir.copy(toGoal.normalize());pl.isSprinting=true;return;
  }

  // Chase free ball
  if(ball.isFree||ball.state===BS.PASS||ball.state===BS.THROUGH||ball.state===BS.SHOT||ball.state===BS.DEFLECT){
    const md=pl.position.distanceTo(ball.position);
    const closer=teammates.some(t=>!t.isLocked&&t!==pl&&t.position.distanceTo(ball.position)<md*.75);
    if(!closer){
      pl.moveDir.subVectors(ball.position,pl.position);pl.moveDir.y=0;pl.isSprinting=true;return;
    }
  }

  // Support (team has ball)
  if(ball.state===BS.CARRY&&ball.possTeam===pl.team){
    const fw=Math.sign(goalX);
    const tx=THREE.MathUtils.clamp(ball.position.x+fw*(8+pl.idx*4),-CFG.hl+5,CFG.hl-5);
    const tz=THREE.MathUtils.clamp((pl.idx-1)*9+Math.sin(performance.now()*.001+pl.idx)*3,-CFG.hw+3,CFG.hw-3);
    const d=new THREE.Vector3(tx,0,tz).sub(pl.position);d.y=0;
    pl.moveDir.copy(d.length()>1.5?d:new THREE.Vector3());pl.isSprinting=false;return;
  }

  // Defend (opponent has ball)
  if(ball.state===BS.CARRY&&ball.possTeam!==pl.team){
    const mx=(ball.position.x+ownGX)*.45+(pl.idx-1)*5;
    const mz=ball.position.z*.5+(pl.idx-1)*6;
    const tx=THREE.MathUtils.clamp(mx,-CFG.hl+3,CFG.hl-3);
    const tz=THREE.MathUtils.clamp(mz,-CFG.hw+3,CFG.hw-3);
    pl.moveDir.subVectors(new THREE.Vector3(tx,0,tz),pl.position);pl.moveDir.y=0;
    pl.isSprinting=true;

    // Auto-tackle near ball carrier
    if(ball.carrier&&ball.carrier.team!==pl.team){
      const dd=pl.position.distanceTo(ball.carrier.position);
      if(dd<CFG.aiTackleRng&&pl.canTackle&&Math.random()<.4*dt*60){
        pl.facing.subVectors(ball.carrier.position,pl.position).normalize();
        pl.triggerTackle(dd<1.5?'standing':'slide');
      }
    }
    return;
  }

  // Default: return home
  const hx=pl.team==='A'?-10+pl.idx*6:10-pl.idx*6;
  const hz=(pl.idx-1)*9;
  const d=new THREE.Vector3(hx,0,hz).sub(pl.position);d.y=0;
  pl.moveDir.copy(d.length()>2?d:new THREE.Vector3());pl.isSprinting=false;
}

/* ══════════════════════════════════════════════════════════════════════════
   COMBAT
   ══════════════════════════════════════════════════════════════════════════ */
function resolveCombat(players,ball,particles,refState){
  const results=[];
  for(const a of players){
    if(a.state!==S.TACKLE&&a.state!==S.SLIDE)continue;
    for(const v of players){
      if(v===a||v.team===a.team)continue;
      if(v.state===S.KD||v.state===S.REC)continue;
      if(v.wakeupProtected>0)continue;
      const dist=a.position.distanceTo(v.position);
      if(dist>2.5)continue;

      const tv=v.position.clone().sub(a.position).normalize();
      const dot=v.facingDir.dot(tv);

      // Foul detection
      const fromBehind=dot<-.25;
      const lateHit=!v.hasBall&&ball.lastToucher===v&&ball.state!==BS.CARRY;
      const inPenalty=Math.abs(v.position.x)>CFG.hl-CFG.pal&&Math.abs(v.position.z)<CFG.paw/2;
      const isSlide=a.state===S.SLIDE;

      let foul=false,severity=0;
      if(fromBehind){foul=true;severity=isSlide?3:2}
      else if(lateHit){foul=true;severity=1}
      else if(isSlide&&Math.random()<.2){foul=true;severity=1}

      // Referee strictness
      const teamFouls=refState.fouls[a.team]||0;
      if(foul)severity=Math.min(4,severity+Math.floor(teamFouls/3));

      // Outcome
      const kd=severity>=2||Math.random()<.3;
      const wipeout=severity>=4;

      if(v.hasBall){ball.forceRelease();ball.vel.copy(tv.clone().multiplyScalar(5+severity))}

      if(wipeout||kd)v.applyKD();else v.applyStun();
      v.velocity.copy(tv.clone().multiplyScalar(3+severity*2));

      a.state=S.LOCO;a.velocity.set(0,0,0);
      a.stats.tackles++;

      // Particles!
      particles.emit(v.position.clone().add(new THREE.Vector3(0,.5,0)),8+severity*4,{
        color:foul?0xff4444:0xffcc00,speed:3+severity,life:.5,scale:.8
      });

      if(foul){
        refState.fouls[a.team]=(refState.fouls[a.team]||0)+1;
        if(inPenalty){
          results.push({foul:true,severity,kd:true,penalty:true,fouler:a,victim:v});
        }else{
          results.push({foul:true,severity,kd,freekick:true,fouler:a,victim:v});
        }
      }else{
        results.push({foul:false,kd,fouler:a,victim:v});
      }
    }
  }
  return results;
}

/* ══════════════════════════════════════════════════════════════════════════
   MATCH STATE MACHINE
   ══════════════════════════════════════════════════════════════════════════ */
const MP={WAIT:0,KICKOFF:1,PLAY:2,GOAL:3,HT:4,FT:5,PAUSE:6,SETPIECE:7,OT_WAIT:8};

function createMatch(){
  return{
    phase:MP.WAIT,half:1,clock:CFG.halfTime,sA:0,sB:0,phaseT:0,
    lastScorer:null,overtime:false,otDone:false,
    setPieceType:null,setPieceTeam:null,setPiecePos:null,
    stats:{possA:0,possB:0,passesA:0,passesB:0},

    get timerStr(){
      const t=Math.max(0,Math.ceil(this.clock));
      return`${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
    },
    get halfLabel(){
      if(this.overtime)return'OVERTIME';
      return this.half===1?'1ST HALF':'2ND HALF';
    },

    start(){
      if(this.phase!==MP.WAIT)return;
      this.phase=MP.KICKOFF;this.phaseT=CFG.koPause;this.half=1;this.clock=CFG.halfTime;this.sA=0;this.sB=0;
      this.overtime=false;this.otDone=false;
      SFX.whistle();
    },
    restart(){this.phase=MP.WAIT;this.half=1;this.clock=CFG.halfTime;this.sA=0;this.sB=0;this.lastScorer=null;this.overtime=false;this.otDone=false},

    registerGoal(side){
      if(this.phase!==MP.PLAY)return;
      if(side>0)this.sA++;else this.sB++;
      this.lastScorer=side>0?'A':'B';
      this.phase=MP.GOAL;this.phaseT=CFG.goalPause;
      SFX.goal();
      if(this.overtime){this.otDone=true}
    },

    triggerSetPiece(type,team,pos){
      this.phase=MP.SETPIECE;this.setPieceType=type;this.setPieceTeam=team;
      this.setPiecePos=pos?pos.clone():new THREE.Vector3();this.phaseT=2;
      SFX.whistle();
    },

    update(dt){
      const ev=[];
      if(this.phase===MP.KICKOFF){
        this.phaseT-=dt;
        if(this.phaseT<=0){this.phase=MP.PLAY;ev.push('kickoff');SFX.whistle()}
      }else if(this.phase===MP.PLAY){
        this.clock-=dt;
        if(this.clock<=0){
          this.clock=0;
          if(this.overtime){this.phase=MP.FT;ev.push('fulltime')}
          else if(this.half===1){this.phase=MP.HT;this.phaseT=CFG.htPause;ev.push('halftime');SFX.whistle()}
          else{
            if(this.sA===this.sB&&!this.otDone){
              this.phase=MP.OT_WAIT;ev.push('overtime_prompt');
            }else{
              this.phase=MP.FT;ev.push('fulltime');
            }
          }
        }
      }else if(this.phase===MP.GOAL){
        this.phaseT-=dt;
        if(this.phaseT<=0){
          if(this.otDone){this.phase=MP.FT;ev.push('fulltime')}
          else{this.phase=MP.KICKOFF;this.phaseT=CFG.koPause;ev.push('restart')}
        }
      }else if(this.phase===MP.HT){
        this.phaseT-=dt;
        if(this.phaseT<=0){this.half=2;this.clock=CFG.halfTime;this.phase=MP.KICKOFF;this.phaseT=CFG.koPause;ev.push('secondhalf');SFX.whistle()}
      }else if(this.phase===MP.OT_WAIT){
        // Auto-start overtime
        this.overtime=true;this.clock=CFG.otTime;this.phase=MP.KICKOFF;this.phaseT=CFG.koPause;ev.push('overtime_start');SFX.whistle();
      }else if(this.phase===MP.SETPIECE){
        this.phaseT-=dt;
        if(this.phaseT<=0){this.phase=MP.PLAY;ev.push('setpiece_end')}
      }
      return ev;
    }
  };
}

/* ══════════════════════════════════════════════════════════════════════════
   FLOW CHAIN & METER
   ══════════════════════════════════════════════════════════════════════════ */
function createFlowChain(){
  return{
    count:0,team:null,lastPassTime:0,hot:false,
    addPass(teamId,now){
      if(teamId!==this.team){this.count=1;this.team=teamId}
      else this.count++;
      this.lastPassTime=now;
      this.hot=this.count>=5;
      if(this.count>=2)SFX.combo();
    },
    breakChain(){this.count=0;this.team=null;this.hot=false},
    checkTimeout(now){if(this.count>0&&now-this.lastPassTime>CFG.comboTimeout)this.breakChain()},
    get passSpeedBonus(){return this.count>=2?1.15:1},
    get meterGainBonus(){return this.count>=3?1.5:1},
    get shotQualityBonus(){return this.count>=4?.2:0},
  };
}

function createMeter(){
  return{
    A:0,B:0,
    gain(team,amount,multiplier=1){
      const v=Math.min(CFG.meterMax,this[team]+amount*multiplier);
      this[team]=v;
    },
    spend(team,cost){
      if(this[team]>=cost){this[team]-=cost;SFX.meter();return true}return false;
    },
    getPercent(team){return this[team]/CFG.meterMax*100},
  };
}

   MINIMAP
   ══════════════════════════════════════════════════════════════════════════ */
const mmCanvas=document.getElementById('minimap-canvas');
const mmCtx=mmCanvas.getContext('2d');

function drawMinimap(players,ball){
  const w=mmCanvas.width,h=mmCanvas.height;
  mmCtx.clearRect(0,0,w,h);
  mmCtx.fillStyle='#0a1818';mmCtx.fillRect(0,0,w,h);

  // Pitch outline
  const sx=x=>(x/CFG.hl*.5+.5)*w;
  const sy=z=>(z/CFG.hw*.5+.5)*h;

  mmCtx.strokeStyle='rgba(255,255,255,.2)';mmCtx.lineWidth=1;
  mmCtx.strokeRect(sx(-CFG.hl),sy(-CFG.hw),sx(CFG.hl)-sx(-CFG.hl),sy(CFG.hw)-sy(-CFG.hw));
  mmCtx.beginPath();mmCtx.moveTo(w/2,sy(-CFG.hw));mmCtx.lineTo(w/2,sy(CFG.hw));mmCtx.stroke();

  // Players
  for(const p of players){
    mmCtx.fillStyle=p.team==='A'?'#3b8bff':'#ff4444';
    mmCtx.beginPath();
    mmCtx.arc(sx(p.position.x),sy(p.position.z),p.isHuman?5:3.5,0,Math.PI*2);
    mmCtx.fill();
    if(p.isHuman){mmCtx.strokeStyle='#ffcc00';mmCtx.lineWidth=1.5;mmCtx.stroke()}
  }

  // Ball
  mmCtx.fillStyle='#ffffff';
  mmCtx.beginPath();mmCtx.arc(sx(ball.position.x),sy(ball.position.z),3,0,Math.PI*2);mmCtx.fill();
}

/* ══════════════════════════════════════════════════════════════════════════
   FIND PASS TARGET
   ══════════════════════════════════════════════════════════════════════════ */
function findPassTarget(passer,teammates){
  if(!teammates)teammates=passer.team==='A'?teamA:teamB;
  let best=null,bestSc=-Infinity;
  for(const t of teammates){
    if(t===passer||t.isLocked)continue;
    const d=t.position.clone().sub(passer.position);d.y=0;
    const dist=d.length();if(dist<2||dist>40)continue;
    const sc=passer.facingDir.dot(d.normalize())*10-dist*.15;
    if(sc>bestSc){bestSc=sc;best=t}
  }
  return best;
}

/* ══════════════════════════════════════════════════════════════════════════
   GAME SETUP
   ══════════════════════════════════════════════════════════════════════════ */
const scene=new THREE.Scene();
createWorld(scene);
const camera=new THREE.PerspectiveCamera(48,window.innerWidth/window.innerHeight,.1,200);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;
document.body.prepend(renderer.domElement);

const particles=new ParticlePool(scene,400);
const ball=createBall();scene.add(ball.mesh);scene.add(ball.trail);

// Spawn positions 3v3
const posA=[new THREE.Vector3(-5,0,0),new THREE.Vector3(-14,0,-9),new THREE.Vector3(-14,0,9)];
const posB=[new THREE.Vector3(5,0,0),new THREE.Vector3(14,0,-9),new THREE.Vector3(14,0,9)];

const teamA=[],teamB=[],allPlayers=[];
posA.forEach((p,i)=>{
  const arch=ARCHETYPES[i];
  const pl=createPlayer('A',i,i===0,p,arch);
  teamA.push(pl);allPlayers.push(pl);scene.add(pl.group);
});
posB.forEach((p,i)=>{
  const arch=ARCHETYPES[i+3];
  const pl=createPlayer('B',i,false,p,arch);
  teamB.push(pl);allPlayers.push(pl);scene.add(pl.group);
});
const human=teamA[0];

const match=createMatch();
const flowChain=createFlowChain();
const meter=createMeter();
const refState={fouls:{A:0,B:0},strictness:{A:1,B:1}};

let camDist=24,camH=17,camTarget=new THREE.Vector3();
let paused=false;
let ctrlHideTimer=15;
let fpsFrames=0,fpsTime=0,fpsVal=60;

// Camera smoothing
const camPos=new THREE.Vector3(0,camH,camDist);

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
window.addEventListener('wheel',e=>{camDist=THREE.MathUtils.clamp(camDist+e.deltaY*.02,12,40);camH=camDist*.72},{passive:true});

// Global functions for buttons
window._restartMatch=()=>{match.restart();resetAll();ball.resetCenter();flowChain.breakChain();meter.A=0;meter.B=0;refState.fouls={A:0,B:0};match.start()};
window._quitMenu=()=>{match.restart();resetAll();ball.resetCenter();flowChain.breakChain();meter.A=0;meter.B=0;refState.fouls={A:0,B:0};elOvC.innerHTML='<div class="badge">REDLINE FC</div><h1>KICK OFF</h1><p>Press <kbd>Space</kbd> to start the match</p>'};
window.resumeGame=()=>{paused=false;elPause.classList.add('hidden')};
window.restartGame=()=>{paused=false;elPause.classList.add('hidden');window._restartMatch()};
window.quitToMenu=()=>{paused=false;elPause.classList.add('hidden');window._quitMenu()};

function resetAll(){
  allPlayers.forEach(p=>p.resetStart());ball.resetCenter();
  allPlayers.forEach(p=>{p.stats={goals:0,assists:0,passes:0,tackles:0,fouls:0,tricks:0,shots:0}});
}
function swapSides(){allPlayers.forEach(p=>{const np=p.startPos.clone();np.x*=-1;p.resetTo(np)})}

/* ══════════════════════════════════════════════════════════════════════════
   GAME LOOP
   ══════════════════════════════════════════════════════════════════════════ */
const gameClock=new THREE.Clock();

renderer.setAnimationLoop(()=>{
  let dt=Math.min(gameClock.getDelta(),.05);

  // FPS counter
  fpsFrames++;fpsTime+=dt;
  if(fpsTime>=1){fpsVal=Math.round(fpsFrames/fpsTime);fpsFrames=0;fpsTime=0;elFps.textContent=`${fpsVal} FPS`}

  // Slow motion
  if(slowMo>0){slowMo-=dt;dt*=.3}

  // Pause
  if(wasP('escape')&&(match.phase===MP.PLAY||match.phase===MP.KICKOFF||paused)){
    paused=!paused;
    elPause.classList.toggle('hidden',!paused);
    if(!paused)initAudio();
  }
  if(paused){endFrame();renderer.render(scene,camera);return}

  updateHoldTimes(dt);

  // Controls hint
  ctrlHideTimer-=dt;
  elCtrl.classList.toggle('hidden',ctrlHideTimer<0);

  // Match events
  const ev=match.update(dt);
  for(const e of ev){
    if(e==='restart'){allPlayers.forEach(p=>p.resetStart());ball.resetCenter();flowChain.breakChain()}
    if(e==='halftime'){showCallout('HALF TIME',3000);flowChain.breakChain()}
    if(e==='secondhalf'){swapSides();ball.resetCenter();showCallout('2ND HALF',2500);flowChain.breakChain()}
    if(e==='fulltime')showFT(match);
    if(e==='overtime_start'){showCallout('⚡ OVERTIME — SUDDEN DEATH!',3000);allPlayers.forEach(p=>p.resetStart());ball.resetCenter()}
    if(e==='kickoff')flowChain.breakChain();
    if(e==='setpiece_end')allPlayers.forEach(p=>{if(p.state===S.SETPIECE)p.state=S.LOCO});
  }

  // Start / Restart
  if(match.phase===MP.WAIT&&wasP(' ','space')){
    initAudio();match.start();resetAll();ball.resetCenter();
    elOvC.innerHTML='<div class="badge">REDLINE FC</div><h1>KICK OFF</h1><p>Starting...</p>';
  }
  if(match.phase===MP.FT&&wasP(' ','space')){window._restartMatch()}

  // ═══ IN-PLAY ═══
  if(match.phase===MP.PLAY){
    // Possession tracking
    if(ball.possTeam==='A')match.stats.possA+=dt;
    else if(ball.possTeam==='B')match.stats.possB+=dt;
    const totalP=match.stats.possA+match.stats.possB;
    if(totalP>0){match.stats.possA_pct=Math.round(match.stats.possA/totalP*100);match.stats.possB_pct=100-match.stats.possA_pct;
      match.stats.possA=match.stats.possA_pct;match.stats.possB=match.stats.possB_pct}

    // Flow chain timeout
    flowChain.checkTimeout(performance.now()/1000);

    // ═══ HUMAN INPUT ═══
    if(!human.isLocked){
      human.moveDir.set(
        Number(isDown('d','arrowright'))-Number(isDown('a','arrowleft')),0,
        Number(isDown('s','arrowdown'))-Number(isDown('w','arrowup'))
      );
      human.isSprinting=isDown('shift');
      human.isStrafing=isDown('control');

      // Pass
      if(wasP(' ','space')&&human.hasBall){
        const tgt=findPassTarget(human);
        let type='short';
        if(isDown('shift'))type='driven';
        if(isDown('f'))type='through';

        if(tgt){
          tgt.targetRing.material.opacity=.8;
          const pd=tgt.position.clone().sub(human.position);pd.y=0;
          ball.releasePass(pd,type);
          flowChain.addPass(human.team,performance.now()/1000);
          meter.gain(human.team,CFG.meterPassGain,flowChain.meterGainBonus);
        }else{
          ball.releasePass(human.facingDir,type);
        }
        human.state=S.PASS;human.stateT=.2;
      }

      // Shoot (hold E for charge)
      if(isDown('e')&&human.hasBall){
        human.isCharging=true;
        human.chargeTime=Math.min(1,(holdTime['e']||0)/1);
        elCharge.classList.add('active');
        elChargeFill.style.width=(human.chargeTime*100)+'%';
      }
      if(wasR('e')&&human.hasBall&&human.isCharging){
        const gx=human.team==='A'?CFG.hl:-CFG.hl;
        const sd=new THREE.Vector3(gx,0,human.position.z*.25).sub(human.position);

        // Meter-enhanced shot
        let power=human.chargeTime;
        if(isDown('r')&&meter.spend(human.team,CFG.meterPowerShot)){power=1;showCallout('⚡ POWER SHOT!',1000)}

        ball.releaseShot(sd,power);
        human.state=S.SHOOT;human.stateT=.3;
        human.isCharging=false;human.chargeTime=0;
        elCharge.classList.remove('active');

        meter.gain(human.team,CFG.meterShotGain);
      }
      if(!isDown('e')){human.isCharging=false;elCharge.classList.remove('active')}

      // Tackle
      if(wasP('q')){
        if(isDown('r')&&meter.spend(human.team,CFG.meterPowerTackle)){
          human.triggerTackle('slide');
          showCallout('⚡ POWER TACKLE!',800);
        }else if(isDown('shift')){
          human.triggerTackle('slide');
        }else{
          human.triggerTackle('standing');
        }
      }

      // Trick
      if(wasP('t')&&human.canTrick){
        const tdir=human.moveDir.lengthSq()>.01?human.moveDir.clone():null;
        const success=human.triggerTrick(tdir);
        if(success){
          meter.gain(human.team,CFG.meterTrickGain);
          particles.emit(human.position.clone().add(new THREE.Vector3(0,.3,0)),6,{color:0x44ffaa,speed:2,life:.4,scale:.6,gravity:-2});
        }
      }

      // Meter: Recovery burst (when stunned, press R)
      if(isDown('r')&&(human.state===S.STUN||human.state===S.KD)&&meter.spend(human.team,CFG.meterRecovery)){
        human.state=S.LOCO;human.stateT=0;human.velocity.set(0,0,0);
        showCallout('⚡ RECOVERY!',600);
        particles.emit(human.position.clone().add(new THREE.Vector3(0,.5,0)),10,{color:0x44ccff,speed:4,life:.5});
      }
    }

    // AI update
    for(const pl of allPlayers){
      if(!pl.isHuman){
        const tm=pl.team==='A'?teamA:teamB;
        const op=pl.team==='A'?teamB:teamA;
        updateAI(pl,ball,tm.filter(t=>t!==pl),op,dt,meter);
      }
    }

    // Update all
    for(const pl of allPlayers)pl.update(dt,ball);
    ball.update(dt);

    // Ball pickup triggers pass receive and flow chain
    for(const pl of allPlayers){
      if(pl.hasBall&&ball.passOrigin&&ball.passOrigin!==pl&&ball.passOrigin.team===pl.team){
        ball.passOrigin.stats.assists++;
        ball.passOrigin=null;
      }
    }

    // Goal detection
    if(ball.state===BS.GOAL&&ball.scoredSide!==0){
      match.registerGoal(ball.scoredSide);
      const team=ball.scoredSide>0?'BLUE':'RED';
      showCallout(`⚽ GOAL! ${team}!`,2800,'goal-callout');
      screenFlash=.3;slowMo=.5;
      // Goal celebration particles
      particles.emit(ball.position.clone().add(new THREE.Vector3(0,1,0)),40,{
        color:ball.scoredSide>0?0x3b8bff:0xff4444,speed:8,spread:5,life:1.5,scale:1.2,gravity:-2
      });
      particles.emit(ball.position.clone().add(new THREE.Vector3(0,2,0)),30,{
        color:0xffcc00,speed:6,spread:4,life:1.2,scale:.8,gravity:-3
      });
      // Scorer stats
      if(ball.lastToucher)ball.lastToucher.stats.goals++;
      // Comeback bonus
      if((ball.scoredSide>0&&match.sA<=match.sB)||(ball.scoredSide<0&&match.sB<=match.sA)){
        const t=ball.scoredSide>0?'A':'B';
        meter.gain(t,CFG.meterComebackBonus);
      }
      flowChain.breakChain();
    }

    // Combat
    const combatResults=resolveCombat(allPlayers,ball,particles,refState);
    for(const r of combatResults){
      if(r.foul){
        r.fouler.stats.fouls++;
        if(r.penalty){
          showCallout('PENALTY!',2500,'foul-callout');
          SFX.foul();screenShake=.4;
          match.triggerSetPiece('penalty',r.victim.team,new THREE.Vector3(Math.sign(r.fouler.startPos.x)*-1*(CFG.hl-10),0,0));
        }else if(r.freekick){
          const severityTxt=r.severity>=3?'BRUTAL FOUL!':r.severity>=2?'HARD FOUL!':'FOUL!';
          showCallout(severityTxt,1800,'foul-callout');
          SFX.foul();screenShake=.25;
          match.triggerSetPiece('freekick',r.victim.team,r.victim.position.clone());
        }
      }else{
        SFX.tackle();
        screenShake=.12;
        if(r.kd)meter.gain(r.fouler.team,CFG.meterTackleGain);
      }
    }

    // Crowd ambient
    if(Math.random()<.05)SFX.crowd(ball.speed/CFG.shootMaxSpd);
  }

  // ═══ SET PIECE PHASE ═══
  if(match.phase===MP.SETPIECE){
    showSetPieceIndicator(match.setPieceType||'free kick');
    // Lock players in position
    allPlayers.forEach(p=>{if(p.state===S.LOCO)p.state=S.SETPIECE});
    // Place ball
    if(match.setPiecePos)ball.mesh.position.set(match.setPiecePos.x,CFG.ballY,match.setPiecePos.z);
    ball.vel.set(0,0,0);ball.state=BS.FREE;
  }

  // ═══ PARTICLES ═══
  particles.update(dt);

  // Sprint dust
  for(const pl of allPlayers){
    if(pl.isSprinting&&pl.state===S.LOCO&&pl.velocity.lengthSq()>20){
      if(Math.random()<.15)particles.emit(pl.position.clone(),1,{color:0x665533,speed:1,spread:.5,life:.3,scale:.4,gravity:-1});
    }
  }

  // Ball speed trail
  if(ball.speed>8&&(ball.state===BS.SHOT||ball.state===BS.PASS)){
    particles.emit(ball.position.clone(),1,{color:0xffcc00,speed:.5,spread:.2,life:.2,scale:.3,gravity:0});
  }

  // ═══ CAMERA ═══
  const ballPos=ball.position.clone();ballPos.y=.5;
  // Direction-of-play bias
  const dirBias=ball.possTeam==='A'?3:ball.possTeam==='B'?-3:0;
  camTarget.lerp(new THREE.Vector3(ballPos.x+dirBias,0,ballPos.z),.04);

  // Goal pressure zoom
  const distToGoal=Math.min(Math.abs(ballPos.x-CFG.hl),Math.abs(ballPos.x+CFG.hl));
  const pressureZoom=distToGoal<15?THREE.MathUtils.mapLinear(distToGoal,15,0,0,5):0;

  const targetCamPos=camTarget.clone().add(new THREE.Vector3(0,camH,camDist+pressureZoom));
  camPos.lerp(targetCamPos,.04);

  // Screen shake
  if(screenShake>0){
    const shk=screenShake*2;
    camPos.x+=(Math.random()-.5)*shk;
    camPos.y+=(Math.random()-.5)*shk*.5;
    camPos.z+=(Math.random()-.5)*shk;
    screenShake=Math.max(0,screenShake-dt*2);
  }

  camera.position.copy(camPos);
  camera.lookAt(camTarget.x,0.3,camTarget.z);

  // Screen flash
  if(screenFlash>0){
    scene.fog.color.setHex(0xffffff);
    screenFlash-=dt;
    if(screenFlash<=0)scene.fog.color.setHex(0x080e18);
  }

  // HUD
  hudUpdate(match,ball,flowChain,meter);
  drawMinimap(allPlayers,ball);

  // Hot possession glow on team
  if(flowChain.hot){
    const hotTeam=flowChain.team==='A'?teamA:teamB;
    for(const p of hotTeam){
      p.body.material.emissiveIntensity=.15+Math.sin(performance.now()*.005)*.1;
    }
  }

  renderer.render(scene,camera);
  endFrame();
});
</script>
</body>
